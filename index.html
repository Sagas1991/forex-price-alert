<!-- v2.4 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenixion Price Alert</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0d12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PX Alert">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@600;700&display=swap');
  :root {
    --bg:#0a0d12; --surface:#111520; --surface2:#161c2b; --border:#1e2840;
    --gold:#f0b840; --gold2:#ffd166; --green:#00e5a0; --red:#ff4d6d;
    --blue:#4da6ff; --muted:#4a5570; --text:#ccd6f6; --text2:#7a8aaa;
    --mono:'Share Tech Mono',monospace; --sans:'Barlow',sans-serif; --cond:'Barlow Condensed',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:0 0 60px;}

  header{background:linear-gradient(135deg,#0d1120,#111828);border-bottom:1px solid var(--border);
    padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:16px;}
  .logo{font-family:var(--cond);font-size:20px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;white-space:nowrap;}
  .logo span{color:var(--text2);font-weight:300;}
  #live-time{font-family:var(--mono);font-size:12px;color:var(--text2);}
  #connection-status{font-family:var(--mono);font-size:11px;padding:4px 12px;border-radius:20px;background:#1a2035;border:1px solid var(--border);white-space:nowrap;}
  #connection-status.connected{color:var(--green);border-color:var(--green);}
  #connection-status.disconnected{color:var(--red);border-color:var(--red);}
  #connection-status.connecting{color:var(--gold);border-color:var(--gold);}

  main{max-width:1150px;margin:0 auto;padding:24px 20px;}

  /* ── Settings Bar ── */
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
  .settings-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;}
  .settings-panel .panel-label{font-family:var(--cond);font-size:11px;letter-spacing:1.5px;color:var(--text2);text-transform:uppercase;margin-bottom:8px;}
  .input-row{display:flex;gap:8px;align-items:center;}
  .input-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);
    font-family:var(--mono);font-size:12px;padding:7px 12px;outline:none;transition:border-color .2s;}
  .input-row input:focus{border-color:var(--gold);}
  .btn-sm{background:linear-gradient(135deg,var(--gold),#d4960a);color:#0a0d12;border:none;border-radius:6px;
    font-family:var(--cond);font-size:12px;font-weight:700;letter-spacing:1px;padding:7px 16px;cursor:pointer;
    text-transform:uppercase;white-space:nowrap;transition:opacity .2s;}
  .btn-sm:hover{opacity:.85;}
  .btn-sm.blue{background:linear-gradient(135deg,#2a6dbb,#1a4d8a);color:#fff;}
  .tg-status{font-family:var(--mono);font-size:11px;margin-top:6px;}
  .tg-status.ok{color:var(--green);} .tg-status.err{color:var(--red);}

  /* ── Add Alert Panel ── */
  .add-alert-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:24px;}
  .panel-title{font-family:var(--cond);font-size:14px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;
    margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .panel-title::after{content:'';flex:1;height:1px;background:var(--border);}

  .form-row1{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:10px;align-items:end;}
  .form-row-zone{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
  .form-row-zone.hidden{display:none;}
  .form-row-bottom{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:10px;align-items:end;}
  .form-group label{display:block;font-family:var(--cond);font-size:10px;letter-spacing:1.5px;color:var(--text2);
    text-transform:uppercase;margin-bottom:5px;}
  .form-group input,.form-group select,.form-group textarea{
    width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);
    font-family:var(--sans);font-size:13px;padding:8px 11px;outline:none;transition:border-color .2s;appearance:none;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);}
  .form-group textarea{resize:vertical;min-height:64px;font-size:12px;line-height:1.5;}
  .form-group select option{background:var(--surface);}

  /* bias buttons */
  .bias-toggle{display:flex;gap:6px;}
  .bias-btn{flex:1;padding:8px 6px;border:1px solid var(--border);border-radius:6px;background:var(--bg);
    color:var(--text2);font-family:var(--cond);font-size:12px;font-weight:700;letter-spacing:1px;
    cursor:pointer;text-transform:uppercase;transition:all .2s;text-align:center;}
  .bias-btn.bull.active{background:rgba(0,229,160,.15);border-color:var(--green);color:var(--green);}
  .bias-btn.bear.active{background:rgba(255,77,109,.15);border-color:var(--red);color:var(--red);}

  .btn-add{background:linear-gradient(135deg,var(--gold),#d4960a);color:#0a0d12;border:none;border-radius:6px;
    font-family:var(--cond);font-size:14px;font-weight:700;letter-spacing:1px;padding:10px 22px;cursor:pointer;
    text-transform:uppercase;transition:opacity .2s,transform .1s;white-space:nowrap;}
  .btn-add:hover{opacity:.9;transform:translateY(-1px);}

  /* ── Alerts List ── */
  .alerts-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .alerts-title{font-family:var(--cond);font-size:14px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
  .hdr-btns{display:flex;gap:8px;align-items:center;}
  .toggle-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text2);
    font-family:var(--cond);font-size:11px;letter-spacing:1px;padding:5px 13px;cursor:pointer;text-transform:uppercase;transition:all .2s;}
  .toggle-btn.active{border-color:var(--green);color:var(--green);}
  .btn-clear-all{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);
    font-family:var(--cond);font-size:11px;letter-spacing:1px;padding:5px 13px;cursor:pointer;text-transform:uppercase;transition:all .2s;}
  .btn-clear-all:hover{border-color:var(--red);color:var(--red);}

  #alerts-container{display:flex;flex-direction:column;gap:10px;}
  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:12px;}
  .empty-state .icon{font-size:34px;margin-bottom:10px;opacity:.4;}

  /* card */
  .alert-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:14px 16px;display:grid;grid-template-columns:88px 1fr auto auto auto auto;
    gap:12px;align-items:start;transition:border-color .3s;position:relative;overflow:hidden;}
  .alert-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
  .alert-card.type-touch::before{background:var(--gold);}
  .alert-card.type-above::before{background:var(--green);}
  .alert-card.type-below::before{background:var(--red);}
  .alert-card.type-zone::before{background:var(--blue);}
  .alert-card.triggered{border-color:var(--gold);background:#1a1500;animation:triggerPulse .5s ease;}
  @keyframes triggerPulse{0%{box-shadow:0 0 0 0 rgba(240,184,64,.5);}100%{box-shadow:0 0 0 20px rgba(240,184,64,0);}}

  .card-pair{font-family:var(--cond);font-size:18px;font-weight:700;color:var(--gold2);letter-spacing:1px;padding-top:2px;}
  .card-bias-tag{display:inline-block;font-family:var(--cond);font-size:10px;letter-spacing:1px;padding:2px 7px;
    border-radius:3px;font-weight:700;margin-top:4px;}
  .bias-bull{background:rgba(0,229,160,.15);color:var(--green);}
  .bias-bear{background:rgba(255,77,109,.15);color:var(--red);}

  .card-info{display:flex;flex-direction:column;gap:4px;}
  .card-type-badge{display:inline-block;font-family:var(--cond);font-size:10px;letter-spacing:1px;
    padding:2px 7px;border-radius:3px;text-transform:uppercase;font-weight:600;width:fit-content;}
  .badge-touch{background:rgba(240,184,64,.15);color:var(--gold);}
  .badge-above{background:rgba(0,229,160,.15);color:var(--green);}
  .badge-below{background:rgba(255,77,109,.15);color:var(--red);}
  .badge-zone{background:rgba(77,166,255,.15);color:var(--blue);}
  .card-level{font-family:var(--mono);font-size:12px;color:var(--text2);}
  .card-level span{color:var(--text);}
  .card-note{font-size:11px;color:var(--muted);font-style:italic;line-height:1.5;max-width:380px;margin-top:2px;}

  .card-live-price{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--text);text-align:right;min-width:95px;}
  .card-live-price .price-label{display:block;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
  .card-status{font-family:var(--cond);font-size:11px;letter-spacing:1px;padding:4px 9px;border-radius:20px;
    text-transform:uppercase;text-align:center;min-width:75px;align-self:center;}
  .status-watching{background:rgba(255,255,255,.05);color:var(--text2);}
  .status-triggered{background:rgba(240,184,64,.2);color:var(--gold);}
  .status-loading{background:rgba(77,166,255,.1);color:var(--blue);}

  .card-actions{display:flex;flex-direction:column;gap:5px;align-self:center;}
  .btn-icon{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:3px 6px;
    border-radius:4px;transition:color .2s;line-height:1;}
  .btn-icon:hover{color:var(--red);}
  .btn-reset{font-family:var(--cond);font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:4px;
    background:rgba(240,184,64,.1);border:1px solid rgba(240,184,64,.3);color:var(--gold);cursor:pointer;transition:all .2s;}
  .btn-reset:hover{background:rgba(240,184,64,.2);}

  /* repeat badge */
  .repeat-badge{font-family:var(--mono);font-size:10px;color:var(--blue);margin-top:2px;}

  /* ── Log ── */
  #fired-log{margin-top:24px;}
  .log-title{font-family:var(--cond);font-size:14px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;
    margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .log-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .log-entry{background:var(--surface2);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;
    padding:9px 14px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;font-size:12px;gap:10px;}
  .log-pair{font-family:var(--cond);font-size:14px;color:var(--gold2);font-weight:700;white-space:nowrap;}
  .log-bias{font-family:var(--cond);font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;}
  .log-msg{color:var(--text);flex:1;}
  .log-time{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;}

  @media(max-width:768px){
    header{padding:12px 14px;}
    main{padding:14px;}
    .settings-grid{grid-template-columns:1fr;}
    .form-row1{grid-template-columns:1fr 1fr;}
    .alert-card{grid-template-columns:70px 1fr auto auto;}
    .card-live-price{display:none;}
  }

</style>
</head>
<body>

<header>
  <div class="logo">Phoenixion <span>/ Price Alert</span></div>
  <div id="live-time">--:--:-- UTC-4</div>
  <div id="connection-status" class="disconnected">● Disconnected</div>
</header>

<main>

  <!-- Settings -->
  <div class="settings-grid">
    <div class="settings-panel">
      <div class="panel-label">TwelveData API Key</div>
      <div class="input-row">
        <input type="password" id="api-key-input" placeholder="Paste your TwelveData API key…">
        <button class="btn-sm" onclick="saveApiKey()">Connect</button>
      </div>
    </div>
    <div class="settings-panel">
      <div class="panel-label">Telegram Alerts</div>
      <div class="input-row">
        <input type="text" id="tg-token" placeholder="Bot Token (from @BotFather)">
        <input type="text" id="tg-chatid" placeholder="Chat ID" style="max-width:120px;">
        <button class="btn-sm blue" onclick="saveTelegram()">Save</button>
        <button class="btn-sm blue" onclick="testTelegram()" style="background:linear-gradient(135deg,#1a5c3a,#0d3b24);">Test</button>
      </div>
      <div class="tg-status" id="tg-status"></div>
    </div>
  </div>

  <!-- Add Alert -->
  <div class="add-alert-panel">
    <div class="panel-title">Add New Alert</div>

    <div class="form-row1">
      <div class="form-group">
        <label>Pair</label>
        <input type="text" id="f-pair" placeholder="e.g. EUR/USD" style="text-transform:uppercase;">
      </div>
      <div class="form-group">
        <label>Alert Type</label>
        <select id="f-type" onchange="onTypeChange()">
          <option value="touch">Touches Level</option>
          <option value="above">Breaks Above</option>
          <option value="below">Breaks Below</option>
          <option value="zone">Enters Zone</option>
        </select>
      </div>
      <div class="form-group" id="fg-level">
        <label>Price Level</label>
        <input type="number" id="f-level" placeholder="e.g. 1.08500" step="0.00001">
      </div>
      <div class="form-group">
        <label>Bias</label>
        <div class="bias-toggle">
          <button class="bias-btn bull" id="bias-bull" onclick="setBias('bull')">▲ Bull</button>
          <button class="bias-btn bear" id="bias-bear" onclick="setBias('bear')">▼ Bear</button>
        </div>
      </div>
      <div class="form-group">
        <label>Re-Alert</label>
        <select id="f-repeat">
          <option value="once">Fire Once</option>
          <option value="repeat">Repeat (cooldown 5m)</option>
          <option value="always">Always (every touch)</option>
        </select>
      </div>
    </div>

    <div class="form-row-zone hidden" id="zone-row">
      <div class="form-group">
        <label>Zone Lower</label>
        <input type="number" id="f-zone-low" placeholder="Lower boundary" step="0.00001">
      </div>
      <div class="form-group">
        <label>Zone Upper</label>
        <input type="number" id="f-zone-high" placeholder="Upper boundary" step="0.00001">
      </div>
    </div>

    <div class="form-row-bottom">
      <div class="form-group">
        <label>Analysis / Setup Notes</label>
        <textarea id="f-note" placeholder="e.g. H1 OB + FVG below. Midnight open bearish bias. Waiting for sweep of 1.0850 then sell. Target: 1.0780. SL above OB at 1.0870."></textarea>
      </div>
      <div>
        <button class="btn-add" onclick="addAlert()">+ Add Alert</button>
      </div>
    </div>
  </div>

  <!-- Active Alerts -->
  <div class="alerts-header">
    <div class="alerts-title">⚡ Active Alerts <span id="alert-count" style="color:var(--text2);font-size:12px;"></span></div>
    <div class="hdr-btns">
      <button class="toggle-btn active" id="sound-toggle" onclick="toggleSound()">🔊 Sound</button>
      <button class="btn-clear-all" onclick="clearAll()">Clear All</button>
    </div>
  </div>

  <div id="alerts-container">
    <div class="empty-state"><div class="icon">📡</div>No alerts yet. Add a pair above to start monitoring.</div>
  </div>

  <div id="fired-log"></div>
</main>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let alerts    = JSON.parse(localStorage.getItem('px_alerts') || '[]');
let apiKey    = localStorage.getItem('px_apikey')  || '';
let tgToken   = localStorage.getItem('px_tgtoken') || '';
let tgChatId  = localStorage.getItem('px_tgchat')  || '';
let soundOn   = true;
let livePrices= {};
let pollTimer = null;
let selectedBias = null; // 'bull' | 'bear' | null

// ── Init ───────────────────────────────────────────────────────────────────────
window.onload = () => {
  if (apiKey)   document.getElementById('api-key-input').value = '••••••••••••••••';
  if (tgToken)  document.getElementById('tg-token').value   = '••••••••••••••••';
  if (tgChatId) document.getElementById('tg-chatid').value  = tgChatId;
  renderAlerts();
  if (apiKey) startPolling();
  startClock();
  requestNotificationPermission();
};

// ── Clock ──────────────────────────────────────────────────────────────────────
function startClock() {
  setInterval(() => {
    const now = new Date();
    const ny  = new Date(now.getTime() - 4 * 3600000);
    document.getElementById('live-time').textContent =
      pad(ny.getUTCHours())+':'+pad(ny.getUTCMinutes())+':'+pad(ny.getUTCSeconds())+' UTC-4 (NY)';
  }, 1000);
}
function pad(n){ return String(n).padStart(2,'0'); }

// ── API Keys ───────────────────────────────────────────────────────────────────
function saveApiKey() {
  const input = document.getElementById('api-key-input');
  const val   = input.value.trim();
  // If field is empty, warn. If it looks like our own masking (all bullets), use stored key.
  if (!val) { alert('Please enter your TwelveData API key.'); return; }
  if ([...val].every(c => c === '•')) {
    // Field still has our masking — key already saved, just reconnect
    if (apiKey) { startPolling(); return; }
    alert('Please enter your TwelveData API key.');
    return;
  }
  apiKey = val;
  localStorage.setItem('px_apikey', apiKey);
  input.value = '••••••••••••••••';
  startPolling();
}

function saveTelegram() {
  const tok  = document.getElementById('tg-token').value.trim();
  const chat = document.getElementById('tg-chatid').value.trim();
  if (!tok.includes('•') && tok) { tgToken = tok; localStorage.setItem('px_tgtoken', tgToken); }
  if (chat) { tgChatId = chat; localStorage.setItem('px_tgchat', tgChatId); }
  document.getElementById('tg-token').value  = tgToken  ? '••••••••••••••••' : '';
  document.getElementById('tg-chatid').value = tgChatId || '';
  document.getElementById('tg-status').textContent = 'Saved ✓';
  document.getElementById('tg-status').className   = 'tg-status ok';
}

async function testTelegram() {
  if (!tgToken || !tgChatId) { alert('Save Telegram bot token and chat ID first.'); return; }
  const ok = await sendTelegram('🟢 Phoenixion Alert connected! Test message from your Price Alert tool.');
  const el = document.getElementById('tg-status');
  if (ok) { el.textContent = '✓ Test message sent!'; el.className = 'tg-status ok'; }
  else    { el.textContent = '✗ Failed — check token / chat ID'; el.className = 'tg-status err'; }
}

async function sendTelegram(text) {
  if (!tgToken || !tgChatId) return false;
  try {
    const res = await fetch(`https://api.telegram.org/bot${tgToken}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: tgChatId, text, parse_mode: 'HTML' })
    });
    const data = await res.json();
    return data.ok;
  } catch { return false; }
}

// ── Notification ───────────────────────────────────────────────────────────────
function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default')
    Notification.requestPermission();
}

// ── Form helpers ───────────────────────────────────────────────────────────────
function onTypeChange() {
  const t = document.getElementById('f-type').value;
  document.getElementById('fg-level').style.display = t === 'zone' ? 'none' : '';
  document.getElementById('zone-row').className = 'form-row-zone' + (t === 'zone' ? '' : ' hidden');
}

function setBias(b) {
  selectedBias = (selectedBias === b) ? null : b;
  document.getElementById('bias-bull').className = 'bias-btn bull' + (selectedBias === 'bull' ? ' active' : '');
  document.getElementById('bias-bear').className = 'bias-btn bear' + (selectedBias === 'bear' ? ' active' : '');
}

// ── Add Alert ──────────────────────────────────────────────────────────────────
function addAlert() {
  let pair = document.getElementById('f-pair').value.trim().toUpperCase().replace(/\s/g,'');
  // Auto-insert slash if missing: EURUSD -> EUR/USD, XAUUSD -> XAU/USD
  if (pair && !pair.includes('/')) {
    if (pair.length === 6) pair = pair.slice(0,3) + '/' + pair.slice(3);
    else if (pair.length === 7) pair = pair.slice(0,4) + '/' + pair.slice(4); // e.g. XAU/USD
  }
  const type   = document.getElementById('f-type').value;
  const note   = document.getElementById('f-note').value.trim();
  const repeat = document.getElementById('f-repeat').value;

  if (!pair) { alert('Enter a currency pair.'); return; }

  let level = null, zoneLow = null, zoneHigh = null;
  if (type === 'zone') {
    zoneLow  = parseFloat(document.getElementById('f-zone-low').value);
    zoneHigh = parseFloat(document.getElementById('f-zone-high').value);
    if (isNaN(zoneLow) || isNaN(zoneHigh)) { alert('Enter both zone boundaries.'); return; }
    if (zoneLow >= zoneHigh) { alert('Lower must be less than upper.'); return; }
  } else {
    level = parseFloat(document.getElementById('f-level').value);
    if (isNaN(level)) { alert('Enter a valid price level.'); return; }
  }

  alerts.push({
    id: Date.now(), pair, type, level, zoneLow, zoneHigh, note,
    bias: selectedBias, repeat,
    triggered: false, triggeredPrice: null, triggeredTime: null,
    lastPrice: null, lastAlertTime: null, fireCount: 0
  });

  saveAlerts(); renderAlerts();
  if (apiKey) startPolling();

  // reset form
  ['f-pair','f-level','f-zone-low','f-zone-high','f-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-type').value   = 'touch';
  document.getElementById('f-repeat').value = 'once';
  onTypeChange();
  selectedBias = null;
  document.getElementById('bias-bull').className = 'bias-btn bull';
  document.getElementById('bias-bear').className = 'bias-btn bear';
}

// ── Remove / Reset / Clear ─────────────────────────────────────────────────────
function removeAlert(id) {
  alerts = alerts.filter(a => a.id !== id);
  saveAlerts(); renderAlerts();
}

function resetAlert(id) {
  const a = alerts.find(x => x.id === id);
  if (!a) return;
  a.triggered = false; a.triggeredPrice = null; a.lastAlertTime = null;
  saveAlerts(); renderAlerts();
}

function clearAll() {
  if (!confirm('Clear all alerts?')) return;
  alerts = [];
  saveAlerts(); renderAlerts();
  document.getElementById('fired-log').innerHTML = '';
  setStatus('disconnected','● Disconnected');
}

function saveAlerts() { localStorage.setItem('px_alerts', JSON.stringify(alerts)); }

// ── REST Polling (TwelveData) ──────────────────────────────────────────────────
function getPairs() { return [...new Set(alerts.map(a => a.pair))]; }

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollOnce();
  pollTimer = setInterval(pollOnce, 1800000); // every 30 minutes
}

async function pollOnce() {
  if (!apiKey) return;
  const pairs = getPairs();
  if (!pairs.length) { setStatus('disconnected','● No alerts'); return; }

  setStatus('connecting','● Fetching…');

  // TwelveData /price endpoint with multiple symbols — all in ONE call
  // Must NOT encode commas. Format: symbol=EUR/USD,GBP/USD,XAU/USD
  const url = 'https://api.twelvedata.com/price?symbol=' + pairs.join(',') + '&apikey=' + apiKey;

  try {
    const res  = await fetch(url);
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch(e) { setStatus('disconnected','● Parse Error'); return; }

    // Top-level error = bad key or plan issue
    if (data.status === 'error') {
      setStatus('disconnected', '● ' + (data.message || 'API Error').slice(0, 60));
      return;
    }

    setStatus('connected','● Live');
    startCountdown(1800);

    if (pairs.length === 1) {
      // Single pair: {price: "1.234"}
      if (data.price) handlePrice(pairs[0], parseFloat(data.price));
      else setStatus('disconnected', '● ' + (data.message || 'No price'));
    } else {
      // Multiple pairs: {"EUR/USD": {price:"1.234"}, "GBP/USD": {price:"1.567"}, ...}
      let gotAny = false;
      for (const pair of pairs) {
        const entry = data[pair];
        if (entry && entry.price && !entry.status) {
          handlePrice(pair, parseFloat(entry.price));
          gotAny = true;
        }
      }
      if (!gotAny) {
        // Fallback: maybe returned as flat object for some pairs
        if (data.price) { handlePrice(pairs[0], parseFloat(data.price)); }
        else setStatus('disconnected','● No prices returned');
      }
    }
  } catch(e) {
    setStatus('disconnected','● Network Error');
  }
}


function handlePrice(pair, price) {
  livePrices[pair] = price;
  updatePriceInCards(pair, price);
  checkAlerts(pair, price);
}

let countdownTimer = null;
function startCountdown(seconds) {
  if (countdownTimer) clearInterval(countdownTimer);
  let remaining = seconds;
  const tick = () => {
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    setStatus('connected', `● Live — next check in ${m}:${pad(s)}`);
    if (remaining <= 0) clearInterval(countdownTimer);
    remaining--;
  };
  tick();
  countdownTimer = setInterval(tick, 1000);
}

function setStatus(cls, txt) {
  const el = document.getElementById('connection-status');
  el.className = cls;
  el.textContent = txt;
}

// ── Check Alerts ───────────────────────────────────────────────────────────────
function checkAlerts(sym, price) {
  let changed = false;
  alerts.forEach(a => {
    if (a.pair !== sym) return;

    // For 'once' mode, skip if already triggered
    if (a.repeat === 'once' && a.triggered) return;

    // Cooldown for repeat mode (5 min)
    if (a.repeat === 'repeat' && a.lastAlertTime) {
      if (Date.now() - a.lastAlertTime < 5 * 60 * 1000) { a.lastPrice = price; return; }
    }

    let fired = false, msg = '';

    if (a.type === 'touch') {
      const prev = a.lastPrice;
      if (prev !== null) {
        const crossed = (prev < a.level && price >= a.level) ||
                        (prev > a.level && price <= a.level) ||
                        Math.abs(price - a.level) < a.level * 0.00008;
        if (crossed) { fired = true; msg = `touched <b>${a.level}</b>`; }
      }
    } else if (a.type === 'above') {
      if (price > a.level) { fired = true; msg = `broke ABOVE <b>${a.level}</b>`; }
    } else if (a.type === 'below') {
      if (price < a.level) { fired = true; msg = `broke BELOW <b>${a.level}</b>`; }
    } else if (a.type === 'zone') {
      if (price >= a.zoneLow && price <= a.zoneHigh) {
        fired = true; msg = `entered zone <b>${a.zoneLow} – ${a.zoneHigh}</b>`;
      }
    }

    a.lastPrice = price;

    if (fired) {
      a.triggered      = true;
      a.triggeredPrice = price;
      a.triggeredTime  = new Date().toISOString();
      a.lastAlertTime  = Date.now();
      a.fireCount      = (a.fireCount || 0) + 1;
      changed = true;
      fireAlert(a, msg, price);
    }
  });
  if (changed) { saveAlerts(); renderAlerts(); }
}

// ── Fire Alert ─────────────────────────────────────────────────────────────────
function fireAlert(a, msg, price) {
  if (soundOn) playAlertSound();

  const biasText = a.bias === 'bull' ? '🟢 BUY SETUP' : a.bias === 'bear' ? '🔴 SELL SETUP' : '';
  const noteText = a.note ? `\n📝 ${a.note}` : '';
  const plainMsg = `${msg.replace(/<b>/g,'').replace(/<\/b>/g,'')}`;

  // Browser notification
  if (Notification.permission === 'granted') {
    new Notification(`🚨 ${a.pair} ${biasText}`, {
      body: `Price ${plainMsg} @ ${price}${a.note ? '\n'+a.note.slice(0,80) : ''}`
    });
  }

  // Telegram
  const tgText = `🚨 <b>${a.pair} ALERT</b>\n`
    + (biasText ? `${biasText}\n` : '')
    + `Price ${plainMsg}\nLive: <b>${price}</b>`
    + noteText;
  sendTelegram(tgText);

  addToLog(a, msg, price);
}

function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    // Alarm pattern — 3 loud bursts, each with siren sweep + noise punch
    const masterGain = ctx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(ctx.destination);

    function burst(startTime) {
      // Siren sweep: low to high
      const siren = ctx.createOscillator();
      const sirenGain = ctx.createGain();
      siren.connect(sirenGain); sirenGain.connect(masterGain);
      siren.type = 'sawtooth';
      siren.frequency.setValueAtTime(400, startTime);
      siren.frequency.linearRampToValueAtTime(1200, startTime + 0.18);
      siren.frequency.linearRampToValueAtTime(400, startTime + 0.36);
      sirenGain.gain.setValueAtTime(0, startTime);
      sirenGain.gain.linearRampToValueAtTime(0.9, startTime + 0.02);
      sirenGain.gain.setValueAtTime(0.9, startTime + 0.34);
      sirenGain.gain.linearRampToValueAtTime(0, startTime + 0.38);
      siren.start(startTime); siren.stop(startTime + 0.4);

      // Sharp high beep on top
      const beep = ctx.createOscillator();
      const beepGain = ctx.createGain();
      beep.connect(beepGain); beepGain.connect(masterGain);
      beep.type = 'square';
      beep.frequency.value = 1800;
      beepGain.gain.setValueAtTime(0, startTime);
      beepGain.gain.linearRampToValueAtTime(0.6, startTime + 0.01);
      beepGain.gain.linearRampToValueAtTime(0, startTime + 0.08);
      beep.start(startTime); beep.stop(startTime + 0.1);
    }

    // 3 bursts with short gap
    burst(ctx.currentTime);
    burst(ctx.currentTime + 0.45);
    burst(ctx.currentTime + 0.90);

    // Final long alarm tone
    const alarm = ctx.createOscillator();
    const alarmGain = ctx.createGain();
    alarm.connect(alarmGain); alarmGain.connect(masterGain);
    alarm.type = 'square';
    alarm.frequency.setValueAtTime(960, ctx.currentTime + 1.4);
    alarm.frequency.setValueAtTime(720, ctx.currentTime + 1.65);
    alarm.frequency.setValueAtTime(960, ctx.currentTime + 1.9);
    alarm.frequency.setValueAtTime(720, ctx.currentTime + 2.15);
    alarmGain.gain.setValueAtTime(0.8, ctx.currentTime + 1.4);
    alarmGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 2.4);
    alarm.start(ctx.currentTime + 1.4);
    alarm.stop(ctx.currentTime + 2.4);

  } catch(_) {}
}

function toggleSound() {
  soundOn = !soundOn;
  const btn = document.getElementById('sound-toggle');
  btn.textContent = soundOn ? '🔊 Sound' : '🔇 Sound';
  btn.className   = 'toggle-btn' + (soundOn ? ' active' : '');
}

// ── Log ────────────────────────────────────────────────────────────────────────
function addToLog(a, msg, price) {
  const log = document.getElementById('fired-log');
  if (!log.querySelector('.log-title')) {
    const t = document.createElement('div');
    t.className = 'log-title'; t.textContent = '🔔 Triggered Log';
    log.prepend(t);
  }
  const now = new Date();
  const ny  = new Date(now.getTime() - 4*3600000);
  const ts  = pad(ny.getUTCHours())+':'+pad(ny.getUTCMinutes())+':'+pad(ny.getUTCSeconds())+' UTC-4';
  const biasHtml = a.bias === 'bull'
    ? `<span class="log-bias bias-bull">▲ BUY</span>`
    : a.bias === 'bear'
    ? `<span class="log-bias bias-bear">▼ SELL</span>` : '';
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `
    <span class="log-pair">${a.pair}</span>
    ${biasHtml}
    <span class="log-msg">Price ${msg} @ <b>${price}</b>${a.note ? ' — '+a.note.slice(0,60)+'…' : ''}</span>
    <span class="log-time">${ts}</span>`;
  const title = log.querySelector('.log-title');
  log.insertBefore(entry, title ? title.nextSibling : log.firstChild);
}

// ── Update price in card ───────────────────────────────────────────────────────
function updatePriceInCards(sym, price) {
  document.querySelectorAll(`.card-live-price[data-pair="${sym}"]`).forEach(el => {
    el.innerHTML = `<span class="price-label">Live Price</span>${price.toFixed(5)}`;
  });
}

// ── Edit Alert ────────────────────────────────────────────────────────────────────
function editAlert(id) {
  const a = alerts.find(x => x.id === id);
  if (!a) return;

  // Populate form with existing values
  document.getElementById('f-pair').value   = a.pair;
  document.getElementById('f-type').value   = a.type;
  document.getElementById('f-note').value   = a.note || '';
  document.getElementById('f-repeat').value = a.repeat || 'once';

  if (a.type === 'zone') {
    document.getElementById('f-zone-low').value  = a.zoneLow  || '';
    document.getElementById('f-zone-high').value = a.zoneHigh || '';
  } else {
    document.getElementById('f-level').value = a.level || '';
  }
  onTypeChange();

  // Set bias
  selectedBias = a.bias || null;
  document.getElementById('bias-bull').className = 'bias-btn bull' + (selectedBias === 'bull' ? ' active' : '');
  document.getElementById('bias-bear').className = 'bias-btn bear' + (selectedBias === 'bear' ? ' active' : '');

  // Change Add button to Save
  const btn = document.querySelector('.btn-add[onclick="addAlert()"]');
  btn.textContent = '✎ Save Edit';
  btn.onclick = () => saveEdit(id);

  // Scroll to form
  document.querySelector('.add-alert-panel').scrollIntoView({ behavior: 'smooth' });
}

function saveEdit(id) {
  const idx = alerts.findIndex(x => x.id === id);
  if (idx === -1) return;

  const pair   = document.getElementById('f-pair').value.trim().toUpperCase().replace(/\s/g,'');
  const type   = document.getElementById('f-type').value;
  const note   = document.getElementById('f-note').value.trim();
  const repeat = document.getElementById('f-repeat').value;

  let pairFmt = pair;
  if (pairFmt && !pairFmt.includes('/')) {
    if (pairFmt.length === 6) pairFmt = pairFmt.slice(0,3) + '/' + pairFmt.slice(3);
    else if (pairFmt.length === 7) pairFmt = pairFmt.slice(0,4) + '/' + pairFmt.slice(4);
  }

  if (!pairFmt) { alert('Enter a currency pair.'); return; }

  let level = null, zoneLow = null, zoneHigh = null;
  if (type === 'zone') {
    zoneLow  = parseFloat(document.getElementById('f-zone-low').value);
    zoneHigh = parseFloat(document.getElementById('f-zone-high').value);
    if (isNaN(zoneLow) || isNaN(zoneHigh)) { alert('Enter both zone boundaries.'); return; }
  } else {
    level = parseFloat(document.getElementById('f-level').value);
    if (isNaN(level)) { alert('Enter a valid price level.'); return; }
  }

  // Update alert in place, preserve triggered state and fire count
  alerts[idx] = {
    ...alerts[idx],
    pair: pairFmt, type, level, zoneLow, zoneHigh, note,
    bias: selectedBias, repeat,
    triggered: false, triggeredPrice: null, lastAlertTime: null
  };

  saveAlerts();
  renderAlerts();

  // Reset form and button
  ['f-pair','f-level','f-zone-low','f-zone-high','f-note'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('f-type').value   = 'touch';
  document.getElementById('f-repeat').value = 'once';
  onTypeChange();
  selectedBias = null;
  document.getElementById('bias-bull').className = 'bias-btn bull';
  document.getElementById('bias-bear').className = 'bias-btn bear';

  const btn = document.querySelector('.btn-add');
  btn.textContent = '+ Add Alert';
  btn.onclick = addAlert;

  if (apiKey) startPolling();
}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderAlerts() {
  const container = document.getElementById('alerts-container');
  const count = document.getElementById('alert-count');
  count.textContent = alerts.length ? `(${alerts.length})` : '';

  if (!alerts.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📡</div>No alerts yet. Add a pair above to start monitoring.</div>`;
    return;
  }

  container.innerHTML = '';
  alerts.forEach(a => {
    const typeLabel  = {touch:'Touches',above:'Breaks Above',below:'Breaks Below',zone:'Enters Zone'}[a.type];
    const badgeClass = {touch:'badge-touch',above:'badge-above',below:'badge-below',zone:'badge-zone'}[a.type];
    const cardClass  = `alert-card type-${a.type}${a.triggered ? ' triggered' : ''}`;
    const levelText  = a.type === 'zone'
      ? `<span>${a.zoneLow}</span> – <span>${a.zoneHigh}</span>`
      : `<span>${a.level}</span>`;
    const livePrice  = livePrices[a.pair];
    const livePriceHtml = livePrice
      ? `<span class="price-label">Live Price</span>${livePrice.toFixed(5)}`
      : `<span class="price-label">Live Price</span>–`;
    const statusClass = a.triggered ? 'status-triggered' : 'status-watching';
    const statusText  = a.triggered ? `⚡ ${a.triggeredPrice}` : 'Watching';
    const biasHtml    = a.bias === 'bull'
      ? `<span class="card-bias-tag bias-bull">▲ Bullish · BUY</span>`
      : a.bias === 'bear'
      ? `<span class="card-bias-tag bias-bear">▼ Bearish · SELL</span>` : '';
    const repeatHtml  = a.repeat !== 'once'
      ? `<span class="repeat-badge">🔁 ${a.repeat === 'repeat' ? 'Repeat (5m cooldown)' : 'Always'} · fired ${a.fireCount||0}×</span>` : '';
    const resetBtn    = a.triggered && a.repeat === 'once'
      ? `<button class="btn-reset" onclick="resetAlert(${a.id})">↺ Reset</button>` : '';

    const card = document.createElement('div');
    card.className = cardClass;
    card.dataset.id = a.id;
    card.innerHTML = `
      <div>
        <div class="card-pair">${a.pair}</div>
        ${biasHtml}
      </div>
      <div class="card-info">
        <span class="card-type-badge ${badgeClass}">${typeLabel}</span>
        <span class="card-level">${typeLabel}: ${levelText}</span>
        ${repeatHtml}
        ${a.note ? `<span class="card-note">${a.note}</span>` : ''}
      </div>
      <div class="card-live-price" data-pair="${a.pair}">${livePriceHtml}</div>
      <div class="card-status ${statusClass}">${statusText}</div>
      <div class="card-actions">
        ${resetBtn}
        <button class="btn-icon" onclick="editAlert(${a.id})" title="Edit" style="color:var(--blue);font-size:13px;">✎</button>
        <button class="btn-icon" onclick="removeAlert(${a.id})" title="Remove">✕</button>
      </div>`;
    container.appendChild(card);
  });
}
</script>

    navigator.serviceWorker.register('sw.js')

  });
